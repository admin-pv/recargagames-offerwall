[build]
  publish = "."

# Edge function de clique. Path declarado também em click.ts (export const config).
# Manter sincronizado.
[[edge_functions]]
  function = "click"
  path     = "/click"

# Headers de segurança aplicados a tudo. SPA estática, sem necessidade de
# X-Frame-Options frouxo nem inline scripts externos não-confiáveis.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "interest-cohort=()"
